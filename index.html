<!DOCTYPE html>
<html lang="sr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ART - Aero Ring Tech</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="brand">
    <img class="brand-logo" src="Logo.png" alt="ART">
    <div class="brand-text">
      <span class="brand-name">Aero Ring Tech</span>
      <span class="brand-sub">The Art of Flight</span>
    </div>
  </div>
  <div class="header-right">
    <!-- User chip (visible when logged in) -->
    <div class="user-chip" id="user-chip" style="display:none">
      <span class="role-badge" id="user-role-badge">admin</span>
      <span class="user-name" id="user-name">Administrator</span>
      <button class="hdr-btn btn-logout" id="btn-logout" title="Odjavi se">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    <!-- Login button (visible when NOT logged in) -->
    <button class="hdr-btn hdr-btn-login" id="btn-header-login" style="display:none" title="Prijavi se">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span>Prijavi se</span>
    </button>
    <button class="hdr-btn" id="btn-theme" title="Toggle theme">
      <svg id="ico-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="ico-sun"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="hdr-btn" id="btn-lang">EN</button>
    <div class="status-badge">
      <div class="dot" id="dot"></div>
      <span id="status-txt"></span>
    </div>
  </div>
</header>

<!-- ── NAV ── -->
<nav>
  <button class="nav-tab active" data-page="tracking">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="nav-txt" data-i18n="navTracking"></span>
  </button>
  <button class="nav-tab" data-page="device">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6.5 6.5l11 11M6.5 17.5l11-11"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-dasharray="2 2"/><path d="M4.93 4.93l14.14 14.14" style="display:none"/><path d="M8 3.93A9 9 0 0 1 20.07 16M15.73 20.56A9 9 0 0 1 3.44 8.27"/></svg>
    <span class="nav-txt" data-i18n="navDevice"></span>
  </button>
  <button class="nav-tab" data-page="rings">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
    <span class="nav-txt" data-i18n="navRings"></span>
  </button>
  <button class="nav-tab" data-page="results">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
    <span class="nav-txt" data-i18n="navResults"></span>
  </button>
</nav>

<!-- ── PAGES ── -->
<div id="pages">

  <!-- PAGE 1: TRACKING -->
  <div class="page active" id="page-tracking">
    <div class="tracking-layout">
      <aside class="tracking-aside">
        <div>
          <div class="lbl" data-i18n="lblHeight"></div>
          <div class="height-card">
            <div class="h-num" id="h-val">—</div>
            <div class="h-unit" data-i18n="lblMeters"></div>
          </div>
        </div>
        <div>
          <div class="lbl" data-i18n="lblStats"></div>
          <div class="stats-row">
            <div class="stat-box"><div class="stat-label" data-i18n="lblMax"></div><div class="stat-val hi" id="max-val">—</div></div>
            <div class="stat-box"><div class="stat-label" data-i18n="lblMin"></div><div class="stat-val lo" id="min-val">—</div></div>
          </div>
        </div>
        <div class="controls-section">
          <div class="lbl" data-i18n="lblConn"></div>
          <div class="controls">
            <div class="no-ble-warn" id="no-ble-warn"></div>
            <button class="btn-connect" id="btn-connect">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M8 6L4 10l4 4M16 6l4 4-4 4M14 4l-4 16"/></svg>
              <span data-i18n="btnConnect"></span>
            </button>
            <button class="btn-disconnect" id="btn-disconnect" style="display:none">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              <span data-i18n="btnDisconnect"></span>
            </button>
            <button class="btn-sim" id="btn-sim">
              <svg id="sim-ico-play" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <svg id="sim-ico-stop" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              <span id="sim-btn-txt" data-i18n="btnSimStart"></span>
            </button>
            <button class="btn-reset" id="btn-reset" data-i18n="btnReset"></button>
          </div>
        </div>
        <div class="cfg-section">
          <div class="lbl" data-i18n="lblBLECfg"></div>
          <div class="cfg-block">
            <div class="cfg-field"><label>Service UUID</label><input id="cfg-svc" value="0000fff0-0000-1000-8000-00805f9b34fb" spellcheck="false"></div>
            <div class="cfg-field"><label>Characteristic UUID</label><input id="cfg-char" value="0000fff1-0000-1000-8000-00805f9b34fb" spellcheck="false"></div>
            <div class="cfg-field">
              <label data-i18n="lblDataFmt"></label>
              <select id="cfg-fmt">
                <option value="float32"   data-i18n="fmtFloat32"></option>
                <option value="uint16_cm" data-i18n="fmtUint16cm"></option>
                <option value="uint16_m"  data-i18n="fmtUint16m"></option>
                <option value="text"      data-i18n="fmtText"></option>
                <option value="json"      data-i18n="fmtJSON"></option>
              </select>
            </div>
          </div>
        </div>
      </aside>
      <div class="graph-panel">
        <div class="graph-hdr">
          <div class="lbl" style="margin:0" data-i18n="lblGraphTitle"></div>
          <div class="graph-meta">
            <span id="graph-legend" class="graph-legend"></span>
            <span id="pts-count"></span>
          </div>
        </div>
        <div class="graph-wrap"><canvas id="graph"></canvas></div>
      </div>
    </div>
  </div>

  <!-- PAGE 2: DEVICE -->
  <div class="page" id="page-device">
    <div class="page-scroll">
      <div class="page-inner">
        <div class="page-title" data-i18n="p2Title"></div>
        <div class="device-hero">
          <div class="device-img-wrap">
            <img class="device-img" src="Baza.png" alt="ART Base Device" onerror="this.style.display='none';this.parentElement.innerHTML+='<div style=\'color:var(--muted);font-size:.85rem\'>Baza.png</div>'">
          </div>
          <div class="device-status-row">
            <div class="dot" id="dot2"></div>
            <span id="p2-status-txt"></span>
          </div>
          <div class="device-conn-btns">
            <button class="dev-btn dev-btn-primary" id="p2-btn-connect">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M8 6L4 10l4 4M16 6l4 4-4 4M14 4l-4 16"/></svg>
              <span data-i18n="btnConnect"></span>
            </button>
            <button class="dev-btn dev-btn-danger" id="p2-btn-disconnect" style="display:none">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              <span data-i18n="btnDisconnect"></span>
            </button>
          </div>
          <div class="no-ble-warn" id="p2-no-ble" style="width:100%;max-width:400px;text-align:center;"></div>
        </div>
        <div class="lbl" data-i18n="p2DevInfo"></div>
        <div class="info-grid">
          <div class="info-card">
            <div class="info-card-label" data-i18n="p2DevName"></div>
            <div class="info-card-val" id="dev-name">—</div>
          </div>
          <div class="info-card">
            <div class="info-card-label" data-i18n="p2Signal"></div>
            <div class="signal-bars" id="dev-signal">
              <div class="bar" style="height:5px"></div>
              <div class="bar" style="height:9px"></div>
              <div class="bar" style="height:13px"></div>
              <div class="bar" style="height:17px"></div>
            </div>
            <div style="font-size:.72rem;color:var(--muted);margin-top:4px" id="dev-signal-txt">—</div>
          </div>
          <div class="info-card">
            <div class="info-card-label" data-i18n="p2Battery"></div>
            <div class="info-card-val" id="dev-battery">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE 3: RINGS -->
  <div class="page" id="page-rings">
    <div class="rings-layout">
      <!-- LEFT: reader + form -->
      <div class="rings-left">
        <div class="lbl" data-i18n="p3ReadSection"></div>
        <div class="ring-reader">
          <div class="ring-anim" id="ring-anim"><img src="Prsten.png" alt="prsten" style="width:48px;height:48px;object-fit:contain;"></div>
          <div class="ring-id-box" id="ring-id-display">— — —</div>
          <button class="dev-btn dev-btn-primary" id="btn-read-ring" style="padding:9px 20px;font-size:.82rem">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span data-i18n="p3ReadBtn"></span>
          </button>
        </div>
        <div class="lbl" data-i18n="p3FormSection"></div>
        <div class="form-block">
          <div class="form-row"><label data-i18n="p3FirstName"></label><input id="ring-first" type="text"></div>
          <div class="form-row"><label data-i18n="p3LastName"></label><input id="ring-last" type="text"></div>
          <div class="form-row"><label data-i18n="p3Club"></label><input id="ring-club" type="text"></div>
          <button class="btn-save-ring" id="btn-save-ring" disabled>
            <span data-i18n="p3SaveBtn"></span>
          </button>
        </div>
      </div>
      <!-- RIGHT: list -->
      <div class="rings-right">
        <div class="lbl" data-i18n="p3ListSection"></div>
        <div class="rings-table-wrap">
          <table class="data-table" id="rings-table">
            <thead>
              <tr>
                <th data-i18n="p3ColID"></th>
                <th data-i18n="p3ColName"></th>
                <th data-i18n="p3ColClub"></th>
                <th data-i18n="p3ColTime"></th>
              </tr>
            </thead>
            <tbody id="rings-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE 4: RESULTS -->
  <div class="page" id="page-results">
    <div class="results-layout">
      <div class="results-toolbar">
        <span class="results-title" data-i18n="p4Title"></span>
        <button class="toolbar-btn tbtn-add" id="btn-add-result">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="p4Add"></span>
        </button>
        <button class="toolbar-btn tbtn-csv" id="btn-export-csv">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span data-i18n="p4Export"></span>
        </button>
        <button class="toolbar-btn tbtn-del" id="btn-del-results">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          <span data-i18n="p4DeleteAll"></span>
        </button>
      </div>
      <div class="results-controls">
        <div class="res-search-wrap">
          <svg class="res-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="res-search-input" id="res-search" type="text" autocomplete="off" spellcheck="false" data-i18n-ph="p4SearchPlaceholder">
          <button class="res-search-clear" id="res-search-clear">✕</button>
        </div>
        <div class="res-sort-pills">
          <button class="sort-pill" data-qsort="newest" data-i18n="p4SortNewest"></button>
          <button class="sort-pill" data-qsort="longest" data-i18n="p4SortLongest"></button>
          <button class="sort-pill" data-qsort="highest" data-i18n="p4SortHighest"></button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="results-table" id="results-table">
          <thead>
            <tr>
              <th data-i18n="p4ColNum"></th>
              <th class="sortable" data-sort="name" data-i18n="p4ColName"></th>
              <th class="sortable" data-sort="club" data-i18n="p4ColClub"></th>
              <th class="sortable" data-sort="duration" data-i18n="p4ColDuration"></th>
              <th class="sortable" data-sort="maxH" data-i18n="p4ColMaxH"></th>
              <th class="sortable" data-sort="avgH" data-i18n="p4ColAvgH"></th>
              <th class="sortable" data-sort="datetime" data-i18n="p4ColDT"></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>
      <div class="summary-strip">
        <div class="sum-card"><div class="sum-label" data-i18n="p4Total"></div><div class="sum-val" id="sum-total">0</div></div>
        <div class="sum-card"><div class="sum-label" data-i18n="p4AvgMax"></div><div class="sum-val" id="sum-avg">—</div><div class="sum-sub">m</div></div>
        <div class="sum-card"><div class="sum-label" data-i18n="p4Best"></div><div class="sum-val" id="sum-best" style="font-size:.95rem">—</div></div>
      </div>
    </div>
  </div>

</div><!-- /#pages -->

<!-- ── FOOTER ── -->
<footer>
  <span>Aero Ring Tech</span><span>·</span>
  <span>Web Bluetooth API</span><span>·</span>
  <span data-i18n="footerReq"></span>
</footer>

<!-- ── MODAL: Add Result ── -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" data-i18n="modalTitle"></div>
    <div class="modal-fields">
      <div class="modal-row"><label data-i18n="p4ColName"></label><input id="m-name" type="text"></div>
      <div class="modal-row"><label data-i18n="p4ColClub"></label><input id="m-club" type="text"></div>
      <div class="modal-row"><label data-i18n="modalDuration"></label><input id="m-dur" type="text" placeholder="00:00:00"></div>
      <div class="modal-row"><label data-i18n="p4ColMaxH"></label><input id="m-max" type="number" step="0.1" min="0"></div>
      <div class="modal-row"><label data-i18n="p4ColAvgH"></label><input id="m-avg" type="number" step="0.1" min="0"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel" data-i18n="modalCancel"></button>
      <button class="modal-save"   id="modal-save"   data-i18n="modalSave"></button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- ── LOGIN OVERLAY ── -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <img class="login-logo" src="Logo.png" alt="ART Logo">
    <div class="login-brand">Aero Ring Tech</div>
    <div class="login-tagline">The Art of Flight</div>

    <!-- ── Tab switcher ── -->
    <div class="login-tabs" role="tablist">
      <button class="login-tab active" id="tab-login"    data-tab="login"    role="tab" data-i18n="tabLogin">Prijava</button>
      <button class="login-tab"        id="tab-register" data-tab="register" role="tab" data-i18n="tabRegister">Registracija</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <form id="login-form" class="login-form tab-pane active" autocomplete="on" novalidate>
      <div class="login-field">
        <label for="login-email" data-i18n="fldEmail">Email adresa</label>
        <input type="email" id="login-email" placeholder="vas@email.com" autocomplete="email" required>
      </div>
      <div class="login-field">
        <label for="login-pass" data-i18n="fldPassword">Lozinka</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="login-msg login-error" id="login-error"></div>
      <button type="submit" class="login-submit" id="login-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span data-i18n="btnLogin">Prijavi se</span>
      </button>
    </form>

    <!-- ── REGISTER FORM ── -->
    <form id="register-form" class="login-form tab-pane" autocomplete="on" novalidate>
      <div class="login-field">
        <label for="reg-name" data-i18n="fldFullName">Ime i prezime</label>
        <input type="text" id="reg-name" autocomplete="name" required>
      </div>
      <div class="login-field">
        <label for="reg-email" data-i18n="fldEmail">Email adresa</label>
        <input type="email" id="reg-email" autocomplete="email" required>
      </div>
      <div class="reg-fields-row">
        <div class="login-field">
          <label for="reg-pass" data-i18n="fldPassword">Lozinka</label>
          <input type="password" id="reg-pass" autocomplete="new-password" required>
        </div>
        <div class="login-field">
          <label for="reg-confirm" data-i18n="fldConfirm">Potvrda lozinke</label>
          <input type="password" id="reg-confirm" autocomplete="new-password" required>
        </div>
      </div>
      <div class="login-field">
        <label for="reg-club" data-i18n="fldClub">Naziv kluba <span class="opt-tag" data-i18n="fldOptional">(opciono)</span></label>
        <input type="text" id="reg-club" autocomplete="organization">
      </div>
      <div class="login-field">
        <label for="reg-role" data-i18n="fldRole">Uloga</label>
        <select id="reg-role" class="login-select">
          <option value="admin"  data-i18n="roleAdmin">Administrator</option>
          <option value="club"   data-i18n="roleClub">Klub</option>
          <option value="viewer" data-i18n="roleViewer" selected>Gledalac</option>
        </select>
      </div>
      <div class="login-msg login-error"   id="reg-error"></div>
      <div class="login-msg login-success" id="reg-success"></div>
      <button type="submit" class="login-submit" id="reg-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <span data-i18n="btnRegister">Registruj se</span>
      </button>
    </form>

    <div class="login-divider"><span data-i18n="dividerOr">ili</span></div>
    <button class="login-guest-btn" id="login-guest">
      <span data-i18n="btnGuest">Nastavi kao gost — samo rezultati →</span>
    </button>
  </div>
</div>

<!-- ── MODAL: Detail View ── -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-box detail-modal-box">
    <div class="detail-hdr">
      <div class="detail-hdr-left">
        <div class="det-name" id="det-competitor">—</div>
        <div class="det-club" id="det-club">—</div>
      </div>
      <div class="detail-hdr-right">
        <div class="det-dt" id="det-datetime">—</div>
        <button class="btn-detail-close" id="btn-detail-close">✕</button>
      </div>
    </div>
    <div class="detail-chart-section">
      <div class="detail-chart-title" data-i18n="detChartTitle">Altitude Profile — Full Flight</div>
      <div class="detail-chart-wrap"><canvas id="detail-chart"></canvas></div>
    </div>
    <div class="detail-tbl-section">
      <div class="detail-tbl-title" data-i18n="detPigeonsTitle">Race Participants</div>
      <div class="tbl-wrap">
        <table class="detail-table">
          <thead><tr>
            <th data-i18n="detColName">Pigeon</th>
            <th data-i18n="detColDuration">Duration</th>
            <th data-i18n="detColAbove800">Time Above 800m</th>
            <th data-i18n="detColMaxH">Max Altitude (m)</th>
            <th data-i18n="detColValid">Valid Flight</th>
          </tr></thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
